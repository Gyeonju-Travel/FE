<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #map { width: 100%; height: 100%; }
    .my-location {
      position: relative;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .my-location .pulse {
      position: absolute;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(90, 138, 106, 0.45);
      animation: my-location-pulse 2.2s ease-out infinite;
    }
    .my-location img {
      position: relative;
      width: 46px;
      height: 46px;
      z-index: 1;
    }
    @keyframes my-location-pulse {
      0% { transform: scale(1); opacity: 0.65; }
      100% { transform: scale(2.4); opacity: 0; }
    }
    .place-marker {
      position: relative;
      width: 72px;
      height: 82px;
      cursor: pointer;
    }
    .place-marker .pulse {
      position: absolute;
      left: 50%;
      bottom: 27px;
      width: 28px;
      height: 28px;
      margin-left: -14px;
      border-radius: 50%;
      animation: my-location-pulse 2.2s ease-out infinite;
    }
    .place-marker img {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 72px;
      height: 72px;
      margin-left: -36px;
      z-index: 1;
    }
    .place-marker--카페 .pulse { background: rgba(201, 123, 94, 0.5); }
    .place-marker--식당 .pulse { background: rgba(184, 118, 46, 0.5); }
    .place-marker--관광지 .pulse { background: rgba(90, 138, 106, 0.5); }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    function sendMessage(data) {
      if (window.parent) {
        window.parent.postMessage(JSON.stringify(data), '*');
      }
    }

    var params = new URLSearchParams(window.location.search);
    var kakaoJsKey = params.get('key') || '';
    var centerLat = parseFloat(params.get('lat')) || 35.8562;
    var centerLng = parseFloat(params.get('lng')) || 129.2247;
    var level = parseInt(params.get('level'), 10) || 4;
    var markers = [];
    try {
      markers = JSON.parse(params.get('markers') || '[]');
    } catch (e) {}
    var categoryPinUri = {
      '카페': params.get('pinCafe') || '',
      '식당': params.get('pinRestaurant') || '',
      '관광지': params.get('pinTour') || '',
    };
    var myLocationImageSrc = params.get('myLoc') || '';
    var myLocationLat = parseFloat(params.get('myLocLat')) || centerLat;
    var myLocationLng = parseFloat(params.get('myLocLng')) || centerLng;

    function initMap() {
      kakao.maps.load(function () {
        var container = document.getElementById('map');
        window.kakaoMap = new kakao.maps.Map(container, {
          center: new kakao.maps.LatLng(centerLat, centerLng),
          level: level,
        });

        kakao.maps.event.addListener(window.kakaoMap, 'click', function () {
          sendMessage({ type: 'mapClick' });
        });

        markers.forEach(function (place) {
          var el = document.createElement('div');
          el.className = 'place-marker place-marker--' + place.category;
          el.innerHTML =
            '<div class="pulse"></div>' +
            '<img src="' + categoryPinUri[place.category] + '" />';
          el.addEventListener('click', function () {
            sendMessage({ type: 'markerClick', id: place.id });
          });

          new kakao.maps.CustomOverlay({
            map: window.kakaoMap,
            position: new kakao.maps.LatLng(place.lat, place.lng),
            content: el,
            xAnchor: 0.5,
            yAnchor: 1,
            zIndex: 3,
          });
        });

        if (myLocationImageSrc) {
          var myLocationContent =
            '<div class="my-location"><div class="pulse"></div>' +
            '<img src="' + myLocationImageSrc + '" /></div>';
          new kakao.maps.CustomOverlay({
            map: window.kakaoMap,
            position: new kakao.maps.LatLng(myLocationLat, myLocationLng),
            content: myLocationContent,
            xAnchor: 0.5,
            yAnchor: 0.5,
            zIndex: 5,
          });
        }
      });
    }

    var script = document.createElement('script');
    script.src =
      'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' +
      encodeURIComponent(kakaoJsKey) +
      '&autoload=false';
    script.onload = initMap;
    document.body.appendChild(script);

    window.addEventListener('message', function (event) {
      var data = event.data;
      if (typeof data === 'string') {
        try {
          data = JSON.parse(data);
        } catch (e) {
          return;
        }
      }
      if (!data || !window.kakaoMap) return;
      if (data.type === 'zoomIn') {
        window.kakaoMap.setLevel(window.kakaoMap.getLevel() - 1, { animate: true });
      } else if (data.type === 'zoomOut') {
        window.kakaoMap.setLevel(window.kakaoMap.getLevel() + 1, { animate: true });
      } else if (data.type === 'moveTo') {
        window.kakaoMap.panTo(new kakao.maps.LatLng(data.lat, data.lng));
      }
    });
  </script>
</body>
</html>
